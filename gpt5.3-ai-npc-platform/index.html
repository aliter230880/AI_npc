<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI NPC Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 3em; margin-bottom: 10px; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { display: inline-block; padding: 8px 16px; background: rgba(0,255,136,0.1); border: 1px solid #00ff88; border-radius: 20px; color: #00ff88; margin-top: 20px; }
    .characters { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
    .character-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; transition: transform 0.3s; cursor: pointer; }
    .character-card:hover { transform: translateY(-5px); border-color: #00d9ff; }
    .character-name { font-size: 1.5em; margin-bottom: 8px; color: #00d9ff; }
    .character-role { color: #8892b0; margin-bottom: 16px; }
    .chat-section { margin-top: 40px; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; display: none; }
    .chat-section.active { display: block; }
    .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .message { margin-bottom: 16px; padding: 12px 16px; border-radius: 12px; max-width: 80%; }
    .message.user { background: #0066cc; margin-left: auto; }
    .message.npc { background: rgba(0,255,136,0.2); border-left: 3px solid #00ff88; }
    .chat-input { display: flex; gap: 12px; }
    .chat-input input { flex: 1; padding: 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; font-size: 1em; }
    .chat-input button { padding: 16px 32px; background: linear-gradient(90deg, #00d9ff, #00ff88); border: none; border-radius: 12px; color: #1a1a2e; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI NPC Platform</h1>
      <p>Интерактивные персонажи с искусственным интеллектом</p>
      <div class="status" id="status">🔄 Подключение...</div>
    </header>
    <h2 style="margin-bottom: 20px;">Выберите персонажа:</h2>
    <div class="characters" id="characters"></div>
    <div class="chat-section" id="chatSection">
      <h2 id="chatTitle" style="margin-bottom: 20px;"></h2>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Напишите сообщение..." />
        <button onclick="sendMessage()">Отправить</button>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = 'http://localhost:8787';
    let currentSession = null;
    async function checkStatus() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        document.getElementById('status').innerHTML = `✅ API Ready | LLM: ${data.llm} | Updated: ${data.updated || 'N/A'}`;
      } catch { document.getElementById('status').innerHTML = '❌ API Offline'; }
    }
    async function loadCharacters() {
      try {
        const res = await fetch(`${API_BASE}/v1/characters`);
        const chars = await res.json();
        document.getElementById('characters').innerHTML = chars.map(c => 
          `<div class="character-card" onclick="selectCharacter('${c.id}', '${c.name}')">
            <div class="character-name">${c.name}</div>
            <div class="character-role">${c.role}</div>
          </div>`
        ).join('');
      } catch { document.getElementById('characters').innerHTML = '<p>Ошибка. Запустите backend.</p>'; }
    }
    function selectCharacter(id, name) {
      document.getElementById('chatSection').classList.add('active');
      document.getElementById('chatTitle').textContent = `💬 Диалог с ${name}`;
      document.getElementById('chatMessages').innerHTML = '<p>Начните диалог...</p>';
      startSession(id);
    }
    async function startSession(characterId) {
      try {
        const res = await fetch(`${API_BASE}/v1/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ characterId })
        });
        currentSession = await res.json();
      } catch (e) { alert('Ошибка: ' + e.message); }
    }
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentSession) return;
      const messagesDiv = document.getElementById('chatMessages');
      if (messagesDiv.querySelector('p')) messagesDiv.innerHTML = '';
      messagesDiv.innerHTML += `<div class="message user">${text}</div>`;
      input.value = '';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      try {
        const res = await fetch(`${API_BASE}/v1/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSession.id, text })
        });
        const data = await res.json();
        messagesDiv.innerHTML += `<div class="message npc">${data.content}</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } catch (e) { messagesDiv.innerHTML += `<div class="message npc">Ошибка: ${e.message}</div>`; }
    }
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    checkStatus();
    loadCharacters();
  </script>
</body>
</html>
