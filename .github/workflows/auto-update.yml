name: 🤖 AI NPC Auto-Update

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5  # ✅ Обновлено до v5

      - name: Create files
        run: |
          mkdir -p gpt5.3-ai-npc-platform/backend
          
          echo '{
            "name": "ai-npc-platform",
            "private": true,
            "version": "1.0.0",
            "type": "module",
            "scripts": {
              "dev:backend": "node backend/server.mjs",
              "dev:all": "concurrently \"npm run dev:backend\" \"npm run dev\""
            },
            "dependencies": {
              "@fastify/cors": "^11.2.0",
              "fastify": "^5.8.5",
              "openai": "^4.80.0",
              "react": "19.2.3",
              "react-dom": "19.2.3"
            },
            "devDependencies": {
              "@vitejs/plugin-react": "5.1.1",
              "concurrently": "^9.1.0",
              "vite": "7.2.4"
            }
          }' > gpt5.3-ai-npc-platform/package.json

          echo 'import Fastify from "fastify";
          import cors from "@fastify/cors";
          import { randomUUID } from "node:crypto";
          const app = Fastify({ logger: false });
          const port = process.env.PORT || 8787;
          await app.register(cors, { origin: true });
          const characters = [
            { id: "mara", name: "Mara Archivist", role: "Lore Guide" },
            { id: "rook", name: "Captain Rook", role: "Commander" },
            { id: "vexa", name: "Vexa Vale", role: "Merchant" }
          ];
          const sessions = new Map();
          app.get("/health", async () => ({ status: "ok", updated: new Date().toISOString() }));
          app.get("/v1/characters", async () => characters);
          app.post("/v1/sessions", async (req) => {
            const { characterId } = req.body || {};
            const session = { id: randomUUID(), characterId, createdAt: new Date().toISOString() };
            sessions.set(session.id, session);
            return session;
          });
          app.post("/v1/messages", async (req) => {
            const { sessionId, text } = req.body || {};
            const session = sessions.get(sessionId);
            if (!session) return { error: "Session not found" };
            const character = characters.find(c => c.id === session.characterId);
            return { id: randomUUID(), sessionId, role: "npc", content: "[" + character?.name + "]: Привет!", createdAt: new Date().toISOString() };
          });
          app.listen({ port, host: "0.0.0.0" }, () => { console.log("🚀 API: http://localhost:" + port); });' > gpt5.3-ai-npc-platform/backend/server.mjs

          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AI NPC</title></head><body><h1>🤖 AI NPC Platform</h1><div id="s">Loading...</div><script>fetch("http://localhost:8787/health").then(r=>r.json()).then(d=>document.getElementById("s").innerText="✅ Ready: "+d.updated).catch(()=>document.getElementById("s").innerText="❌ Offline");</script></body></html>' > gpt5.3-ai-npc-platform/index.html

      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "🤖 Auto-update" || echo "No changes"
          git push

      - run: echo "✅ DONE! Download via Code → Download ZIP"
